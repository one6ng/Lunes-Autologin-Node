name: Lunes Auto Login

on:
  schedule:
    - cron: "0 1 */10 * *"
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Login Script
        run: node login.js
        env:
          LUNES_USERNAME: ${{ secrets.LUNES_USERNAME }}
          LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}
          SERVER_ID: ${{ secrets.SERVER_ID }}
          SERVER_UUID: ${{ secrets.SERVER_UUID }}
          NODE_HOST: ${{ secrets.NODE_HOST }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
